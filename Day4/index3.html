<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Form</title>
</head>
<body>
    <h1 >Student Registration Form </h1>
    <form action="">
        <fieldset>
            <legend>Personal Details</legend>
            <label for="FullName">FullName :</label>
            <br>
            <input type="text" placeholder="Enter yr full Name">
            <br><br>
            <label for="Email">Email :</label>
            <br>
            <input type="email" placeholder="Enter yr email">
            <br><br>

            <label for="Password">Password :</label>
            <br>
            <input type="password" placeholder="Min 6 charcaters">
            <br><br>

            <label>Gender:</label><br>
            <input type="radio" id="male" name="gender" value="Male"> <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="Female"> <label for="female">Female</label>
            <input type="radio" id="other" name="gender" value="Other"> <label for="other">Other</label><br><br>

            <label for="dob">Date of Birth:</label><br>
            <input type="date" id="dob" name="dob"><br>
        </fieldset>


        <fieldset>
            <legend>Academic Details</legend>
            <label for="class">Select Class:</label><br>
            <select id="class" name="class">
                <option value="">--Choose--</option>
                <option value="10">Class 10</option>
                <option value="11">Class 11</option>
                <option value="12">Class 12</option>
            </select><br><br>

            <label>Subjects:</label><br>
            <input type="checkbox" id="math" name="subjects" value="Math"> <label for="math">Math</label>
            <input type="checkbox" id="science" name="subjects" value="Science"> <label for="science">Science</label>
            <input type="checkbox" id="english" name="subjects" value="English"> <label for="english">English</label><br>
            
        </fieldset>

        <fieldset>
            <legend>Additional Details</legend>
            <label for="Uploadphoto">Upload Photo :</label> <br>
            <input type="file">
            <br>
            <br>
            <label for="">Address :</label> <br>
            <textarea name="" id="Address" placeholder="enter yr address"></textarea>
        </fieldset>

        <fieldset>
            <legend>Full Controls</legend>
            <input type="submit">
            <input type="reset">
            <input type="button" value="Help">

        </fieldset>



        
    </form>
</body>
</html>
